<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>إضافة إلى التقويم</title>

<style>

body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#f5f5f5;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.card{
    background:#fff;
    width:340px;
    padding:30px;
    border-radius:18px;
    box-shadow:0 10px 30px rgba(0,0,0,.1);
    text-align:center;
}

h2{
    margin-top:0;
}

button{
    width:100%;
    padding:16px;
    border:none;
    border-radius:12px;
    background:#007AFF;
    color:#fff;
    font-size:18px;
    cursor:pointer;
}

button:hover{
    opacity:.9;
}

.small{
    margin-top:15px;
    color:#777;
    font-size:14px;
}

</style>

</head>

<body>

<div class="card">

<h2>📅 إضافة الموعد إلى التقويم</h2>

<button onclick="openCalendar()"> إضافة إلى التقويم </button>

<div class="small" id="device"></div>

</div>

<script>

function openCalendar(){

    const ua=navigator.userAgent.toLowerCase();

    if(ua.includes("android")){
        window.location.href="https://calendar.google.com/calendar/render?action=TEMPLATE&text='زواج صالح بن علي بن سعدي'&dates=20260821T130000Z/20260821T190000Z&location=https://maps.app.goo.gl/NeQAPpBb29MYA9cN7?g_st=ic&details='استقبال الضيوف بعد العشاء مباشرة'";
        return;
    }

    if(ua.includes("iphone")||ua.includes("ipad")){
        window.location.href="zwaj-sale7.ics";
        return;
    }

    window.location.href="https://calendar.google.com/calendar/render?action=TEMPLATE&text='زواج صالح بن علي بن سعدي'&dates=20260821T130000Z/20260821T190000Z&location=https://maps.app.goo.gl/NeQAPpBb29MYA9cN7?g_st=ic&details='استقبال الضيوف بعد العشاء مباشرة'";

}

</script>

</body>
    
</html>
